# Render Blueprint — one-shot deploy of the NPC-chat proxy.
# In Render: New ▸ Blueprint ▸ connect this repo. (Or create a Web Service by hand — see proxy/DEPLOY.md;
# the Blueprint is just a convenience.) Secrets (sync:false) are typed into the dashboard, NEVER committed.
services:
  - type: web
    name: shivaliva-npc-proxy
    runtime: node
    plan: free
    rootDir: proxy
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY          # REQUIRED — your DeepSeek key. Only ever lives here, never in the build.
        sync: false
      - key: SHARED_SECRET        # a long random string; the game must send it (stops casual drive-by abuse).
        sync: false
      - key: ADMIN_SECRET         # a long random string; gates the /admin kill switch + stats.
        sync: false
      - key: MAX_TOKENS_CAP
        value: "400"
      - key: RATE_LIMIT_RPM
        value: "15"
      - key: IP_DAILY_CAP
        value: "400"
      - key: DAILY_TOKEN_BUDGET
        value: "1500000"
