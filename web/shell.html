<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas { margin: 0; padding: 0; border: 0; }
body {
	color: #f3eede;
	background-color: #0d0a1f;
	overflow: hidden;
	touch-action: none;
	font-family: 'Segoe UI', 'Noto Sans', 'Droid Sans', Arial, sans-serif;
}
#canvas { display: block; }
#canvas:focus { outline: none; }

/* The pre-game loading screen — a twilight Stardust wash, the splash art floating, a gold bar. */
#status {
	position: absolute; left: 0; right: 0; top: 0; bottom: 0;
	display: flex; flex-direction: column; justify-content: center; align-items: center;
	background: radial-gradient(125% 95% at 50% 32%, #211b4d 0%, #0d0a1f 68%, #06040e 100%);
	visibility: hidden;
}
#sv-wrap { display: flex; flex-direction: column; align-items: center; padding: 0 24px; }
#status-splash {
	width: auto !important; height: auto !important;
	max-width: 300px; max-height: 34vh; object-fit: contain; margin: 0 0 24px;
	border-radius: 16px; box-shadow: 0 12px 46px rgba(0, 0, 0, 0.55);
	animation: sv-float 3.4s ease-in-out infinite;
}
#status-splash.show-image--false { display: none; }
#status-splash.use-filter--false { image-rendering: pixelated; }
@keyframes sv-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
#sv-title {
	font-size: 30px; font-weight: 700; letter-spacing: 1px; color: #f7e6a0;
	text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65); margin-bottom: 20px; text-align: center;
}
#status-progress {
	-webkit-appearance: none; appearance: none;
	width: min(360px, 70vw); height: 9px; border: 0; border-radius: 6px;
	background: rgba(255, 255, 255, 0.10);
}
#status-progress::-webkit-progress-bar { background: rgba(255, 255, 255, 0.10); border-radius: 6px; }
#status-progress::-webkit-progress-value { background: linear-gradient(90deg, #c9962e, #f3cd63); border-radius: 6px; }
#status-progress::-moz-progress-bar { background: linear-gradient(90deg, #c9962e, #f3cd63); border-radius: 6px; }
#sv-hint { margin-top: 16px; font-size: 14px; color: #bab2d6; letter-spacing: 0.5px; }
#status-notice {
	background-color: #3a2030; border-radius: 0.5rem; border: 1px solid #9b3943;
	color: #e6e0e0; line-height: 1.3; margin: 18px 2rem 0; max-width: 80vw;
	overflow: hidden; padding: 1rem; text-align: center; display: none;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">Your browser does not support the canvas tag.</canvas>

		<noscript>Your browser does not support JavaScript.</noscript>

		<div id="status">
			<div id="sv-wrap">
				<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
				<div id="sv-title">$GODOT_PROJECT_NAME</div>
				<progress id="status-progress"></progress>
				<div id="sv-hint">Sailing into the Stardust…</div>
			</div>
			<div id="status-notice"></div>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
